# ================================
# Configuration unchk API
# ================================

# Base de donnees MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/unchk_plateform?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Serveur
server.port=8080

# JWT
jwt.secret=unchk_secret_key_2025_master_ingenierie_logicielle_p8_very_long_key
jwt.expiration=86400000

# Nom de l'application
spring.application.name=unchk-api

# CORS (pour Angular en local)
spring.web.cors.allowed-origins=http://localhost:4200

# Stockage des fichiers joints
app.upload.dir=uploads
# Taille max des uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
